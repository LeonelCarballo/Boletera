<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<header th:fragment="header" class="site-header">
    <div class="header-inner">
        <a href="/static" class="logo">TicketPlace</a>

        <nav class="main-nav">
            <a href="/explorar" class="nav-link">Explorar</a>
            <a href="/eventos" class="nav-link">Eventos</a>
            <a href="/recintos" class="nav-link">Recintos</a>
        </nav>

        <div class="header-actions" sec:authorize="isAnonymous()">
            <a href="/admin/login" class="link-entrar">Entrar</a>
        </div>

        <div class="header-actions" sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 12px;">
            <a th:href="@{/admin/dashboard}" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;">
                <div style="width: 32px; height: 32px; background-color: #FCE7F3; color: #B60055; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;">
                    <span th:text="${#strings.substring(nombreUsuario, 0, 1)}">A</span>
                </div>
                <span th:text="${nombreUsuario}" style="font-weight: 600; font-size: 14px;">Admin</span>
            </a>
            <form th:action="@{/admin/logout}" method="post" style="margin: 0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="link-entrar" style="background: none; border: none; cursor: pointer; font-family: inherit;">Cerrar Sesión</button>
            </form>
        </div>
    </div>
</header>

</html>
