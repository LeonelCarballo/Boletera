<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{admin/fragments/layout :: head('Dashboard')}"></head>
<body class="dashboard-layout">

    <div th:replace="~{admin/fragments/layout :: sidebar}"></div>

    <div class="main-wrapper">
        <header class="dashboard-header">
            <span class="header-logo-mobile">TicketPlace</span>
            <div class="header-actions">
                <div class="header-avatar-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="welcome-heading">
                <h1>Bienvenido de nuevo, <span th:text="${nombreUsuario}">Admin</span></h1>
                <p class="subtitle">Aquí tienes el resumen de la plataforma.</p>
            </div>

            <div class="metrics-grid">
                <article class="metric-card">
                    <h2 class="metric-label">Usuarios Registrados</h2>
                    <p class="metric-value">
                        <span th:text="${totalUsuarios}">0</span>
                        <span class="metric-unit">usuarios</span>
                    </p>
                </article>

                <article class="metric-card">
                    <h2 class="metric-label">Total de Eventos</h2>
                    <p class="metric-value">
                        <span th:text="${totalEventos}">0</span>
                        <span class="metric-unit">eventos</span>
                    </p>
                </article>

                <article class="metric-card">
                    <h2 class="metric-label">Eventos <span style="color: #059669">Activos</span></h2>
                    <p class="metric-value">
                        <span th:text="${totalEventosActivos}">0</span>
                        <span class="metric-unit">eventos</span>
                    </p>
                </article>

                <article class="metric-card">
                    <h2 class="metric-label">Eventos <span style="color: var(--color-neutro)">Inactivos</span></h2>
                    <p class="metric-value">
                        <span th:text="${totalEventosInactivos}">0</span>
                        <span class="metric-unit">eventos</span>
                    </p>
                </article>

                <article class="metric-card">
                    <h2 class="metric-label">Lugares Registrados</h2>
                    <p class="metric-value">
                        <span th:text="${totalLugares}">0</span>
                        <span class="metric-unit">lugares</span>
                    </p>
                </article>
            </div>
        </main>
    </div>

</body>
</html>
