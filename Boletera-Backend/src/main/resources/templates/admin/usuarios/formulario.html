<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head(${usuario != null} ? 'Editar Usuario' : 'Nuevo Usuario')}"></head>
<body class="dashboard-layout">

<div th:replace="~{admin/fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
  <header class="dashboard-header">
    <span class="header-logo-mobile">TicketPlace</span>
  </header>

  <main class="dashboard-content">
    <div class="content-heading">
      <div class="heading-text">
        <h1 th:text="${usuario != null} ? 'Editar Usuario' : 'Nuevo Usuario'">Nuevo Usuario</h1>
        <p class="subtitle" th:text="${usuario != null} ? 'Modifica las credenciales y datos del usuario.' : 'Registra un nuevo usuario en la plataforma.'">Registra un nuevo usuario en la plataforma.</p>
      </div>
    </div>

    <div class="form-card" style="max-width: 600px;">

      <div th:if="${error}"
           style="color: #DC2626; background: #FEF2F2; padding: 12px 16px; border-radius: 6px; margin-bottom: 16px;">
        ⚠️ <span th:text="${error}"></span>
      </div>

      <form th:action="${usuario != null} ? @{/admin/usuarios/{id}(id=${usuario.id})} : @{/admin/usuarios}" method="post">

        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" required minlength="3" maxlength="250"
                 th:value="${usuario != null} ? ${usuario.nombre} : ''">
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" required
                 th:value="${usuario != null} ? ${usuario.email} : ''">
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono (10 dígitos)</label>
          <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{10}" title="Debe contener exactamente 10 dígitos"
                 th:value="${usuario != null} ? ${usuario.telefono} : ''">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit"
                  th:text="${usuario != null} ? 'Guardar Cambios' : 'Guardar Usuario'">Guardar Usuario</button>
        </div>
      </form>
    </div>
  </main>
</div>

</body>
</html>
