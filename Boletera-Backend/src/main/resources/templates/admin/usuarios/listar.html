<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{admin/fragments/layout :: head('Usuarios')}"></head>
<body class="dashboard-layout">

    <div th:replace="~{admin/fragments/layout :: sidebar}"></div>

    <div class="main-wrapper">
        <header class="dashboard-header">
            <span class="header-logo-mobile">TicketPlace</span>
            <div class="header-actions">
                <div class="header-avatar-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="content-heading">
                <div class="heading-text">
                    <h1>Usuarios</h1>
                    <p class="subtitle">Todos los usuarios registrados en la plataforma.</p>
                </div>
            </div>

            <div class="events-grid" th:if="${not #lists.isEmpty(usuarios)}">
                <article class="event-dashboard-card" th:each="usuario : ${usuarios}">
                    <div class="card-body">
                        <h2 class="card-title" th:text="${usuario.nombre}">Nombre</h2>
                        <div class="card-meta" th:text="${usuario.email}">Email</div>
                        <div class="card-meta" th:text="${usuario.telefono}">Teléfono</div>
                        <div class="card-status-badge status-publicado"
                             th:text="${usuario.rol}">Rol</div>

                        <div class="card-actions-footer">
                            <!-- Boton para ir a la vista de editar usuario -->
                            <a th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}" class="btn-card-action color-edit">Editar</a>
                        </div>
                    </div>
                </article>
            </div>

            <p th:if="${#lists.isEmpty(usuarios)}" class="subtitle">No hay usuarios registrados.</p>
        </main>
    </div>

</body>
</html>
