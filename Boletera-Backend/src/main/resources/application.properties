# Configuración de puerto y nombre de aplicación
server.port=8080
spring.application.name=Boletera

# Importa la configuración local con credenciales reales.
spring.config.import=optional:classpath:application-local.properties

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/boleteradb?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cloudinary
cloudinary.cloud_name=
cloudinary.api_key=
cloudinary.api_secret=

# Seguridad
# Secreto para firmar los JWT
app.jwt.secret=
# Credenciales del administrador inicial
app.admin.email=
app.admin.password=
