<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketPlace - Explorar Eventos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/index.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>

  <section class="catalogo-encabezado">
    <p class="breadcrumb">INICIO <span>›</span> EXPLORAR EVENTOS</p>

    <div class="catalogo-titulo-fila">
      <div>
        <h1 class="catalogo-titulo">Encuentra tu próximo <span class="hero-accent">momento.</span></h1>
        <p class="catalogo-subtitulo">Experiencias exclusivas en las mejores ciudades de México.</p>
      </div>

      <button type="button" class="btn-ordenar">
        <img src="/imgs/icon-ordenar.svg" alt="">
        Ordenar: Recomendados
      </button>
    </div>
  </section>

  <section class="catalogo-cuerpo">

    <aside class="filtros">
      <div class="filtros-header">
        <h2>Filtros</h2>
        <a href="/eventos" class="filtros-limpiar">Limpiar</a>
      </div>

      <div class="filtro-grupo">
        <label for="ubicacion">Ubicación</label>
        <div class="input-icon">
          <img src="/imgs/icon-ubicacion.svg" alt="">
          <input type="text" id="ubicacion" name="ubicacion" placeholder="Ciudad o recinto">
        </div>
      </div>

      <div class="filtro-grupo">
        <h3>Categoría</h3>
        <div class="filtro-checkbox">
          <input type="checkbox" id="cat-todos" name="categoria" value="todos" checked>
          <label for="cat-todos">Todos</label>
        </div>
        <div class="filtro-checkbox">
          <input type="checkbox" id="cat-conciertos" name="categoria" value="conciertos">
          <label for="cat-conciertos">Conciertos</label>
        </div>
        <div class="filtro-checkbox">
          <input type="checkbox" id="cat-teatro" name="categoria" value="teatro">
          <label for="cat-teatro">Teatro</label>
        </div>
        <div class="filtro-checkbox">
          <input type="checkbox" id="cat-deportes" name="categoria" value="deportes">
          <label for="cat-deportes">Deportes</label>
        </div>
      </div>

      <div class="filtro-grupo">
        <div class="filtro-presupuesto-fila">
          <h3>Presupuesto</h3>
          <span class="filtro-presupuesto-valor">MXN $5,000+</span>
        </div>
        <input type="range" id="presupuesto" name="presupuesto" min="0" max="5000" step="50" class="filtro-slider">
      </div>
    </aside>

    <div class="tarjetas-grid">

      <article class="tarjeta-evento" th:each="evento : ${eventos}">
        <div class="tarjeta-imagen">
          <img th:src="${evento.imagenUrl}" th:alt="${evento.nombre}"
               onerror="this.src='https://via.placeholder.com/600x400?text=Sin+imagen'">
        </div>
        <div class="tarjeta-contenido">
          <div class="tarjeta-meta">
            <span class="tarjeta-categoria" th:text="${evento.categoria}">CATEGORÍA</span>
            <time th:text="${#temporals.format(evento.fecha, 'dd MMM yyyy')}">Fecha</time>
          </div>
          <h3 class="tarjeta-titulo" th:text="${evento.nombre}">Nombre evento</h3>
          <p class="tarjeta-lugar">
            <img src="/imgs/icon-ubicacion.svg" alt="" class="icono-inline">
            <span th:text="${evento.lugar?.nombre} + ', ' + ${evento.lugar?.ciudad}">Lugar</span>
          </p>
          <div class="tarjeta-footer catalogo-footer">
            <a th:href="@{/evento/{id}(id=${evento.id})}" class="btn-flecha" aria-label="Ver evento">→</a>
          </div>
        </div>
      </article>

      <p th:if="${#lists.isEmpty(eventos)}" class="subtitle">No hay eventos disponibles por el momento.</p>

    </div>
  </section>

  <nav class="paginacion" aria-label="Paginación de eventos">
    <a href="?pagina=0" class="pagina-btn" aria-label="Página anterior">‹</a>
    <a href="?pagina=1" class="pagina-numero activo">1</a>
    <a href="?pagina=2" class="pagina-numero">2</a>
    <a href="?pagina=3" class="pagina-numero">3</a>
    <span class="pagina-puntos">...</span>
    <a href="?pagina=12" class="pagina-numero">12</a>
    <a href="?pagina=2" class="pagina-btn" aria-label="Página siguiente">›</a>
  </nav>

</main>

</body>
</html>
