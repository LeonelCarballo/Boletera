<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head(${lugar != null} ? 'Editar Lugar' : 'Nuevo Lugar')}"></head>
<body class="dashboard-layout">

<div th:replace="~{admin/fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
    <header class="dashboard-header">
        <span class="header-logo-mobile">TicketPlace</span>
    </header>

    <main class="dashboard-content">
        <div class="content-heading">
            <div class="heading-text">
                <h1 th:text="${lugar != null} ? 'Editar Lugar' : 'Nuevo Lugar'">Nuevo Lugar</h1>
                <p class="subtitle">Registra un nuevo recinto en la plataforma.</p>
            </div>
        </div>

        <div class="form-card" style="max-width: 600px;">

            <div th:if="${error}"
                 style="color: #DC2626; background: #FEF2F2; padding: 12px 16px; border-radius: 6px; margin-bottom: 16px;">
                ⚠️ <span th:text="${error}"></span>
            </div>

            <form th:action="${lugar != null} ? @{/admin/lugares/{id}(id=${lugar.id})} : @{/admin/lugares}" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required
                           th:value="${lugar != null} ? ${lugar.nombre} : ''">
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" required
                           th:value="${lugar != null} ? ${lugar.direccion} : ''">
                </div>

                <div class="form-grid-2col">
                    <div class="form-group">
                        <label for="ciudad">Ciudad</label>
                        <input type="text" id="ciudad" name="ciudad" required
                               th:value="${lugar != null} ? ${lugar.ciudad} : ''">
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" name="estado" required
                               th:value="${lugar != null} ? ${lugar.estado} : ''">
                    </div>
                </div>

                <div class="form-group">
                    <label for="capacidad">Capacidad</label>
                    <input type="number" id="capacidad" name="capacidad" required min="1"
                           th:value="${lugar != null} ? ${lugar.capacidad} : ''">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit"
                            th:text="${lugar != null} ? 'Guardar Cambios' : 'Guardar Lugar'">Guardar Lugar</button>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
