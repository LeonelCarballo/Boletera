<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Nuevo Lugar')}"></head>
<body class="dashboard-layout">

<div th:replace="~{admin/fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
    <header class="dashboard-header">
        <span class="header-logo-mobile">TicketPlace</span>
    </header>

    <main class="dashboard-content">
        <div class="content-heading">
            <div class="heading-text">
                <h1>Nuevo Lugar</h1>
                <p class="subtitle">Registra un nuevo recinto en la plataforma.</p>
            </div>
        </div>

        <div class="form-card" style="max-width: 600px;">
            <form th:action="@{/admin/lugares}" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" required>
                </div>

                <div class="form-grid-2col">
                    <div class="form-group">
                        <label for="ciudad">Ciudad</label>
                        <input type="text" id="ciudad" name="ciudad" required>
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" name="estado" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="capacidad">Capacidad</label>
                    <input type="number" id="capacidad" name="capacidad" required min="1">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Guardar Lugar</button>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
