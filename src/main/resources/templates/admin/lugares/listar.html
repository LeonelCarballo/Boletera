<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{admin/fragments/layout :: head('Lugares')}"></head>
<body class="dashboard-layout">

    <div th:replace="~{admin/fragments/layout :: sidebar}"></div>

    <div class="main-wrapper">
        <header class="dashboard-header">
            <span class="header-logo-mobile">TicketPlace</span>
            <div class="header-actions">
                <div class="header-avatar-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="content-heading">
                <div class="heading-text">
                    <h1>Lugares</h1>
                    <p class="subtitle">Todos los recintos registrados en la plataforma.</p>
                </div>
                <a th:href="@{/admin/lugares/nuevo}" class="btn-primary-action">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Nuevo Lugar
                </a>
            </div>

            <div class="events-grid" th:if="${not #lists.isEmpty(lugares)}">
                <article class="event-dashboard-card" th:each="lugar : ${lugares}">
                    <div class="card-body">
                        <h2 class="card-title" th:text="${lugar.nombre}">Nombre</h2>
                        <div class="card-meta" th:text="${lugar.ciudad} + ', ' + ${lugar.estado}">Ciudad</div>
                        <div class="card-meta" th:text="${lugar.direccion}">Dirección</div>
                        <div class="card-status-badge status-publicado"
                             th:text="'Capacidad: ' + ${lugar.capacidad}">Capacidad</div>
                    </div>
                </article>
            </div>

            <p th:if="${#lists.isEmpty(lugares)}" class="subtitle">No hay lugares registrados.</p>
        </main>
    </div>

</body>
</html>
