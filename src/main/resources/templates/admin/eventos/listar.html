<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{admin/fragments/layout :: head('Eventos')}"></head>
<body class="dashboard-layout">

<div th:replace="~{admin/fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
    <header class="dashboard-header">
        <span class="header-logo-mobile">TicketPlace</span>
        <div class="header-actions">
            <div class="header-avatar-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </div>
    </header>

    <main class="dashboard-content">
        <div class="content-heading">
            <div class="heading-text">
                <h1>Eventos</h1>
                <p class="subtitle">Gestiona y supervisa todos los eventos de la plataforma.</p>
            </div>
            <a th:href="@{/admin/eventos/nuevo}" class="btn-primary-action">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nuevo Evento
            </a>
        </div>

        <div class="events-grid" th:if="${not #lists.isEmpty(eventos)}">
            <article class="event-dashboard-card" th:each="evento : ${eventos}">
                <div class="card-image-wrapper">
                    <img th:src="${evento.imagenUrl}" th:alt="${evento.nombre}"
                         onerror="this.src='https://via.placeholder.com/600x160?text=Sin+imagen'">
                </div>
                <div class="card-body">
                    <h2 class="card-title" th:text="${evento.nombre}">Nombre evento</h2>
                    <div class="card-meta">
                        <span th:text="${#temporals.format(evento.fecha, 'dd MMM, yyyy')}">Fecha</span>
                        &bull;
                        <span th:text="${evento.lugar?.ciudad}">Ciudad</span>
                    </div>
                    <div class="card-status-badge"
                         th:classappend="${evento.estado.name() == 'EN_VENTA'} ? 'status-publicado' : (${evento.estado.name() == 'PAUSADO'} ? 'status-pausado' : 'status-borrador')"
                         th:text="${evento.estado}">Estado</div>

                    <div class="card-actions-footer">
                        <a th:href="@{/admin/eventos/{id}/editar(id=${evento.id})}" class="btn-card-action color-edit">Editar</a>
                        <form th:action="@{/admin/eventos/{id}/eliminar(id=${evento.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn-card-action color-delete"
                                    onclick="return confirm('¿Eliminar este evento?')">Borrar</button>
                        </form>
                    </div>
                </div>
            </article>
        </div>

        <p th:if="${#lists.isEmpty(eventos)}" class="subtitle">No hay eventos registrados.</p>
    </main>
</div>

</body>
</html>
