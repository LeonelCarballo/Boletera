<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Nuevo Evento')}"></head>
<body class="dashboard-layout">

<div th:replace="~{admin/fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
    <header class="dashboard-header">
        <span class="header-logo-mobile">TicketPlace</span>
    </header>

    <main class="dashboard-content">
        <div class="content-heading">
            <div class="heading-text">
                <h1>Nuevo Evento</h1>
                <p class="subtitle">Crea un nuevo evento en la plataforma.</p>
            </div>
        </div>

        <div class="form-card" style="max-width: 600px;">
            <form th:action="@{/admin/eventos}" method="post">

                <div class="form-group">
                    <label for="nombre">Nombre del Evento</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="4"></textarea>
                </div>

                <div class="form-grid-2col">
                    <div class="form-group">
                        <label for="fecha">Fecha y Hora</label>
                        <input type="datetime-local" id="fecha" name="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="capacidadTotal">Capacidad Total</label>
                        <input type="number" id="capacidadTotal" name="capacidadTotal" required min="1">
                    </div>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">--Selecciona una opción</option>
                        <option value="MUSICA">Música</option>
                        <option value="DEPORTES">Deportes</option>
                        <option value="TEATRO">Teatro</option>
                        <option value="CONFERENCIA">Conferencia</option>
                        <option value="FESTIVAL">Festival</option>
                        <option value="FAMILIAR">Familiar</option>
                        <option value="OTRO">Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="lugarId">Lugar</label>
                    <select id="lugarId" name="lugarId" required>
                        <option value="">--Selecciona un lugar</option>
                        <option th:each="lugar : ${lugares}"
                                th:value="${lugar.id}"
                                th:text="${lugar.nombre} + ' - ' + ${lugar.ciudad}">
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Crear Evento</button>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
