<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | TicketPlace Admin'">Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/stylePnlAdmin.css}">
</head>

<aside th:fragment="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <span class="logo">TicketPlace</span>
    </div>

    <nav class="sidebar-nav">
        <ul>
            <li>
                <a th:href="@{/admin/dashboard}"
                   th:class="${currentPage == 'dashboard'} ? 'sidebar-link active' : 'sidebar-link'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/admin/eventos}"
                   th:class="${currentPage == 'eventos'} ? 'sidebar-link active' : 'sidebar-link'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Eventos
                </a>
            </li>
            <li>
                <a th:href="@{/admin/lugares}"
                   th:class="${currentPage == 'lugares'} ? 'sidebar-link active' : 'sidebar-link'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    Lugares
                </a>
            </li>
            <li>
                <a th:href="@{/admin/usuarios}"
                   th:class="${currentPage == 'usuarios'} ? 'sidebar-link active' : 'sidebar-link'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Usuarios
                </a>
            </li>
            <li>
                <form th:action="@{/admin/logout}" method="post" style="margin:0">
                    <button type="submit" class="sidebar-link" style="background:none;border:none;width:100%;text-align:left;cursor:pointer;font-family:inherit;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#6b7280" viewBox="0 0 256 256" stroke="currentColor"><path d="M124,216a12,12,0,0,1-12,12H48a12,12,0,0,1-12-12V40A12,12,0,0,1,48,28h64a12,12,0,0,1,0,24H60V204h52A12,12,0,0,1,124,216Zm108.49-96.49-40-40a12,12,0,0,0-17,17L195,116H112a12,12,0,0,0,0,24h83l-19.52,19.51a12,12,0,0,0,17,17l40-40A12,12,0,0,0,232.49,119.51Z"></path></svg>
                        Cerrar Sesión
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="sidebar-user">
        <div class="user-avatar" th:text="${#strings.substring(nombreUsuario, 0, 1)}">A</div>
        <div class="user-info">
            <span class="user-name" th:text="${nombreUsuario}">Admin</span>
            <span class="user-role">Administrador</span>
        </div>
    </div>
</aside>

</html>
