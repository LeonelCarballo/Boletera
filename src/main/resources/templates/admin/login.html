<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TicketPlace Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/stylePnlAdmin.css}">
</head>
<body>

    <main class="main-content">
        <section class="form-section">
            <div class="section-header">
                <a href="#" class="logo" style="display:block;margin-bottom:8px;">TicketPlace</a>
                <h1>Panel de Administración</h1>
                <p class="subtitle">Ingresa tus credenciales para continuar</p>
            </div>

            <article class="form-card">

                <div th:if="${param.error}" style="color:#DC2626;font-size:14px;margin-bottom:16px;font-weight:600;">
                    Correo o contraseña incorrectos.
                </div>
                <div th:if="${param.logout}" style="color:#059669;font-size:14px;margin-bottom:16px;font-weight:600;">
                    Sesión cerrada correctamente.
                </div>

                <form th:action="@{/admin/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-group">
                        <label for="username">Correo electrónico</label>
                        <input type="email" id="username" name="username"
                               placeholder="admin@ticketplace.com" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password"
                               placeholder="••••••••" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Iniciar sesión</button>
                    </div>
                </form>

            </article>
        </section>
    </main>

</body>
</html>
